spring.application.name=FoodGo
server.port=8080

# Data storage (relative to project root when running locally)
foodgo.data-dir=data

# Admin panel credentials
foodgo.admin.username=admin
foodgo.admin.password=admin123

# Logging
logging.level.root=INFO
logging.level.com.foodgo=DEBUG

# Thymeleaf
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Date format
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd'T'HH:mm:ss

# Jackson JSON
spring.jackson.serialization.indent-output=true
spring.jackson.time-zone=UTC

# Multipart file uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Static resource serving (serve uploaded files)
spring.web.resources.static-locations=classpath:/static/,file:data/
